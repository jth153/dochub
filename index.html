<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>หน้า index ทดสอบ</title>
  <style>
    body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans", "Helvetica Neue", Arial; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; background:#f6f8fb; color:#111; }
    .card { background:#fff; padding:2rem; border-radius:12px; box-shadow:0 6px 20px rgba(15,23,42,0.08); text-align:center; max-width:640px; }
    h1 { margin:0 0 .5rem; }
    p { margin:.25rem 0; color:#374151; }
    a.button { display:inline-block; margin-top:1rem; padding:.5rem 1rem; background:#2563eb; color:#fff; border-radius:8px; text-decoration:none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>ไฟล์ PDF (แบบทดสอบ)</h1>
    <p>วางไฟล์ PDF ลงในโฟลเดอร์ `pdfs` แล้วรีเฟรชหน้านี้</p>
    <div id="list">กำลังโหลดรายการไฟล์...</div>
    <a class="button" href="#" id="reload">รีเฟรช</a>
  </div>
  <script>
    function fmtSize(n){ if(n<1024) return n+' B'; if(n<1024*1024) return (n/1024).toFixed(1)+' KB'; return (n/1024/1024).toFixed(2)+' MB'; }
    async function load(){
      const listEl = document.getElementById('list');
      listEl.textContent = 'กำลังโหลดรายการไฟล์...';
      try{
        const res = await fetch('/api/files');
        if(!res.ok) throw new Error(res.statusText);
        const files = await res.json();
        if(!files.length){ listEl.innerHTML = '<p>ไม่พบไฟล์ PDF ในโฟลเดอร์</p>'; return; }
        const ul = document.createElement('div');
        ul.style.textAlign = 'left';
        files.forEach(f=>{
          const row = document.createElement('div');
          row.style.display='flex'; row.style.justifyContent='space-between'; row.style.alignItems='center'; row.style.padding='8px 0'; row.style.borderBottom='1px solid #eef2f7';
          const left = document.createElement('div');
          const name = document.createElement('div'); name.textContent = f.name; name.style.fontWeight='600';
          const meta = document.createElement('div'); meta.textContent = fmtSize(f.size) + ' • ' + new Date(f.mtime).toLocaleString('th-TH'); meta.style.color='#6b7280'; meta.style.fontSize='13px';
          left.appendChild(name); left.appendChild(meta);
          const actions = document.createElement('div');
          const preview = document.createElement('a'); preview.href = '/pdfs/' + encodeURIComponent(f.name); preview.target='_blank'; preview.textContent='Preview'; preview.style.marginRight='8px'; preview.style.color='#2563eb';
          const dl = document.createElement('a'); dl.href = '/pdfs/' + encodeURIComponent(f.name); dl.download = f.name; dl.textContent='Download'; dl.style.color='#059669';
          actions.appendChild(preview); actions.appendChild(dl);
          row.appendChild(left); row.appendChild(actions);
          ul.appendChild(row);
        });
        listEl.innerHTML = '';
        listEl.appendChild(ul);
      }catch(err){ listEl.innerHTML = '<p>เกิดข้อผิดพลาด: '+err.message+'</p>'; }
    }
    document.getElementById('reload').addEventListener('click', function(e){ e.preventDefault(); load(); });
    load();
  </script>
</body>
</html>
